name: Build DRTK Wheels (All Systems)

on:
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build (${{ matrix.os }}, Py ${{ matrix.python }}, CUDA ${{ matrix.cuda }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ['3.10', '3.11', '3.12', '3.13']
        cuda: ['12.6', '12.8', '13.0']
    
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout DRTK repository
        uses: actions/checkout@v4
        with:
          repository: facebookresearch/DRTK

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.30
        with:
          cuda: '${{ matrix.cuda }}.0'

      - name: Install Standard Dependencies
        run: |
          python -m pip install --upgrade pip
          # Installs normally from the standard Python registry
          pip install opencv-python build

      - name: Install PyTorch
        run: |
          # Format CUDA version for PyTorch URL (e.g., 12.6 -> cu126)
          CUDA_WHL="cu${{ matrix.cuda }}"
          CUDA_WHL="${CUDA_WHL//./}"
          
          # Installs PyTorch directly from their custom server
          pip install torch torchvision --index-url https://download.pytorch.org/whl/$CUDA_WHL

      - name: Dynamically Set Target Architectures
        run: |
          if [[ "${{ matrix.cuda }}" == "12.6" ]]; then
            # CUDA 12.6 maxes out at Hopper (9.0)
            echo "ARCH_LIST=7.0;7.2;7.5;8.0;8.6;8.7;8.9;9.0+PTX" >> $GITHUB_ENV
          else
            # CUDA 12.8 and 13.0 support Blackwell (10.0 and 12.0)
            echo "ARCH_LIST=7.0;7.2;7.5;8.0;8.6;8.7;8.9;9.0;10.0;12.0+PTX" >> $GITHUB_ENV
          fi

      - name: Build the Fat Wheel
        env:
          TORCH_CUDA_ARCH_LIST: ${{ env.ARCH_LIST }}
        run: |
          python -m build --wheel --no-isolation

      - name: Upload Wheel as Artifact
        uses: actions/upload-artifact@v4
        with:
          # Guarantees a 100% unique name for every job to prevent overwrites
          name: drtk-${{ matrix.os }}-py${{ matrix.python }}-cu${{ matrix.cuda }}
          path: dist/*.whl
