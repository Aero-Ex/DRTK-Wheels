name: Build DRTK Wheels

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to upload wheels to when run manually (e.g. v0.1.0)'
        required: false
        type: string
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build_wheels:
    # Notice the job name now includes PT version, this tells you the new code is running!
    name: Build (${{ matrix.os }}, Py ${{ matrix.python }}, PT ${{ matrix.pytorch }}, CUDA ${{ matrix.cuda }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python: ['3.10','3.11', '3.12', '3.13']
        pytorch: ['2.7.0', '2.8.0', '2.10.0']
        cuda: ['12.6', '12.8', '13.0']
        exclude:
          - pytorch: '2.7.0'
            cuda: '13.0'
          - pytorch: '2.8.0'
            cuda: '13.0'
    
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout DRTK repository
        uses: actions/checkout@v4
        with:
          repository: facebookresearch/DRTK

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      
      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.30
        with:
          cuda: '${{ matrix.cuda }}.0'
          log-file-suffix: 'py${{ matrix.python }}-pt${{ matrix.pytorch }}-cu${{ matrix.cuda }}.txt'
      - name: Install Standard Dependencies
        run: |
          python -m pip install --upgrade pip
          # Installs normally from the standard Python registry
          pip install opencv-python build wheel

      - name: Install PyTorch
        run: |
          # Format CUDA version for PyTorch URL (e.g., 12.6 -> cu126)
          CUDA_WHL="cu${{ matrix.cuda }}"
          CUDA_WHL="${CUDA_WHL//./}"
          
          # Forces pip to install the exact PyTorch version from the matrix
          pip install torch==${{ matrix.pytorch }} torchvision --index-url https://download.pytorch.org/whl/$CUDA_WHL

      - name: Dynamically Set Target Architectures
        run: |
          if [[ "${{ matrix.cuda }}" == "12.6" ]]; then
            echo "ARCH_LIST=7.0;7.2;7.5;8.0;8.6;8.7;8.9;9.0+PTX" >> $GITHUB_ENV
          elif [[ "${{ matrix.cuda }}" == "13.0" ]]; then
            # CUDA 13 no longer supports compute_70/compute_72.
            echo "ARCH_LIST=7.5;8.0;8.6;8.7;8.9;9.0;10.0;12.0+PTX" >> $GITHUB_ENV
          else
            # 10.0 and 12.0 added for Blackwell on CUDA 12.8+
            echo "ARCH_LIST=7.0;7.2;7.5;8.0;8.6;8.7;8.9;9.0;10.0;12.0+PTX" >> $GITHUB_ENV
          fi

      - name: Patch Windows compile flags
        if: runner.os == 'Windows'
        run: |
          python - <<'PY'
          from pathlib import Path
          setup_py = Path("setup.py")
          text = setup_py.read_text(encoding="utf-8")
          rtti_old, rtti_new = '"/GR-"', '"/GR"'
          if rtti_old not in text:
              raise RuntimeError(f"Expected {rtti_old} in setup.py but did not find it.")
          text = text.replace(rtti_old, rtti_new)
          runtime_old, runtime_new = '"/MT"', '"/MD"'
          if runtime_old not in text:
              raise RuntimeError(f"Expected {runtime_old} in setup.py but did not find it.")
          text = text.replace(runtime_old, runtime_new)
          setup_py.write_text(text, encoding="utf-8")
          PY

      - name: Build the Fat Wheel
        env:
          TORCH_CUDA_ARCH_LIST: ${{ env.ARCH_LIST }}
        run: |
          python -m build --wheel --no-isolation

      - name: Rename wheel with build tag
        env:
          PT_VERSION: ${{ matrix.pytorch }}
          CUDA_VERSION: ${{ matrix.cuda }}
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          pt = os.environ["PT_VERSION"].replace(".", "_")
          cu = os.environ["CUDA_VERSION"].replace(".", "_")
          # PEP 427 build tags must begin with a digit; we use "1" as the build number prefix.
          build_tag = f"1pt{pt}cu{cu}"
          wheel_name_pattern = re.compile(
              r"^(?P<distribution>[^-]+)-(?P<version>[^-]+)"
              r"(?:-(?P<build>[0-9][0-9A-Za-z_]*))?"
              r"-(?P<python_tag>[^-]+)-(?P<abi_tag>[^-]+)-(?P<platform_tag>[^-]+)$"
          )

          for wheel_path in Path("dist").glob("*.whl"):
              match = wheel_name_pattern.fullmatch(wheel_path.stem)
              if not match:
                  raise RuntimeError(
                      "Unexpected wheel filename format: "
                      f"{wheel_path.name}. Expected format: "
                      "distribution-version[-build_tag]-python_tag-abi_tag-platform_tag.whl"
                  )
              parts = match.groupdict()
              if parts["build"]:
                  raise RuntimeError(
                      f"Wheel already has build tag {parts['build']}: {wheel_path.name}"
                  )
              renamed = (
                  f"{parts['distribution']}-{parts['version']}-{build_tag}-"
                  f"{parts['python_tag']}-{parts['abi_tag']}-{parts['platform_tag']}.whl"
              )
              target = wheel_path.with_name(renamed)
              if wheel_path != target:
                  wheel_path.rename(target)
                  print(f"Renamed {wheel_path.name} -> {target.name}")
          PY

      - name: Upload Wheel as Artifact
        uses: actions/upload-artifact@v4
        with:
          # The artifact name now includes the PyTorch version to guarantee it is 100% unique
          name: drtk-${{ matrix.os }}-py${{ matrix.python }}-pt${{ matrix.pytorch }}-cu${{ matrix.cuda }}
          path: dist/*.whl

      - name: Upload Wheel to Release page
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.release_tag)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ (github.event_name == 'release' && github.event.release.tag_name) || inputs.release_tag }}
          files: dist/*.whl
          fail_on_unmatched_files: true
